<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bird Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="a bird with a red head, black back and a white belly">
            <button id="image-btn" title="Upload image"><i class="fa-solid fa-camera"></i></button>
            <button id="search-btn">Search</button>
        </div>
        <input type="file" id="image-input" accept="image/*" hidden>
        <div class="image-preview" id="image-preview"></div>
        <div id="results">
            <div class="results-grid" id="results-grid"></div>
        </div>
    </main>


    <script>
        const imageInput = document.getElementById('image-input');
        const imageBtn = document.getElementById('image-btn');
        const imagePreview = document.getElementById('image-preview');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const resultsGrid = document.getElementById('results-grid');

        let lastResults = [];
        let selectedFile = null;

        function renderColumns(results) {
            const rect = resultsGrid.getBoundingClientRect();
            const numColumns = Math.max(1, Math.floor(rect.width / 250));
            const columns = Array.from({ length: numColumns }, () => []);
            results.forEach((r, i) => columns[i % numColumns].push(r));

            resultsGrid.innerHTML = columns.map(col => `
                <div class="results-column">
                    ${col.map(r => `
                        <div class="result-card">
                            <img src="/images/${r.path}" alt="${r.class_name}" loading="lazy">
                            <div class="info">
                                <div class="class-name">${r.class_name}</div>
                                <div class="score">${r.score.toFixed(3)}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        window.addEventListener('resize', () => {
            if (lastResults.length > 0) renderColumns(lastResults);
        });

        async function search() {
            const query = searchInput.value.trim();

            // Clear image as only one can be used at a time
            if (query) {
                selectedFile = null;
                imageInput.value = '';
                imagePreview.innerHTML = '';
            }

            resultsGrid.innerHTML = '<div class="loading">Searching...</div>';

            let results;

            if (query) {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                results = await response.json();
            } else if (selectedFile) {
                const formData = new FormData();
                formData.append('image', selectedFile);
                const response = await fetch('/search', { method: 'POST', body: formData });
                if (!response.ok) {
                    const res = await response.json();
                    resultsGrid.innerHTML = `<div class="error">${res.error || 'Error searching'}</div>`;
                    return;
                }
                results = await response.json();
            } else {
                resultsGrid.innerHTML = '<div class="no-results">Enter a query or upload an image</div>';
                return;
            }

            lastResults = results;

            if (results.length === 0) {
                resultsGrid.innerHTML = '<div class="no-results">No results found</div>';
                return;
            }

            renderColumns(results);
        }

        imageBtn.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;

                // Clear text input because only 1 can be used at a time
                searchInput.value = '';

                const reader = new FileReader();
                reader.onload = (e) => {
                    imagePreview.innerHTML = `<img src="${e.target.result}" alt="Query image">`;
                };
                reader.readAsDataURL(file);
                search();
            } else {
                selectedFile = null;
                imagePreview.innerHTML = '';
            }
        });

        searchBtn.addEventListener('click', search);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>

</html>
